<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Profiling Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #08080a;
      --bg-surface: #101014;
      --bg-elevated: #18181c;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --text-primary: #FFFFFF;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --accent-primary: #2DD4BF;
      --accent-secondary: #FACC15;
      --status-live: #22C55E;
      --status-error: #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

    .app-header {
      height: 48px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .timeline-viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-base);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    
    .status-dot.connecting {
      background: var(--accent-secondary);
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.live {
      background: var(--status-live);
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: var(--status-error);
      animation: none;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .metric-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .metric-value {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
      font-feature-settings: 'tnum' on, 'lnum' on;
    }

    .metric-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .progress-track {
      height: 2px;
      background: var(--bg-base);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .group-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s ease;
      cursor: pointer;
    }
    
    .group-item:hover {
      background: var(--bg-elevated);
    }

    .data-card {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: 0;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      width: 280px;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .data-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(0,0,0,0.2);
    }

    .data-card-body { padding: 16px; }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    
    .data-row:last-child { margin-bottom: 0; }

    .data-key {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .data-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      text-align: right;
    }

    .data-val.highlight { color: var(--accent-primary); font-weight: 600; }

    .control-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }

    .control-btn:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
    }

    .control-btn.active {
      background: var(--text-primary);
      color: var(--bg-base);
      border-color: var(--text-primary);
    }

    .control-btn.live-active {
      background: var(--status-live);
      color: var(--bg-base);
      border-color: var(--status-live);
    }

    canvas { display: block; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div id="status-dot" class="status-dot connecting"></div>
        <span class="text-sm font-semibold tracking-tight">Profile Session</span>
        <span id="status-text" class="text-xs text-[var(--text-muted)] mono">Connecting...</span>
      </div>
    </div>
    
    <div class="flex items-center gap-3">
      <button id="live-btn" class="control-btn live-active">Follow Live</button>
      <button id="reset-btn" class="control-btn">Reset View</button>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="metric-card">
        <div class="flex justify-between items-end mb-1">
          <div class="metric-label">Rec Time</div>
        </div>
        <div class="metric-value mono" id="stat-time">0.0s</div>
        <div class="text-[10px] text-[var(--text-muted)] mb-3">Streaming duration</div>
        <div class="progress-track">
          <div class="progress-fill bg-[var(--accent-primary)]" id="bar-time" style="width: 0%"></div>
        </div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Active Threads</div>
        <div class="metric-value" id="stat-threads">0</div>
        <div class="progress-track">
          <div class="progress-fill bg-[var(--accent-secondary)]" id="bar-threads" style="width: 0%"></div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto mt-2" id="thread-groups">
        <div class="p-4 text-center text-xs text-[var(--text-muted)]">Waiting for stream...</div>
      </div>
    </aside>

    <main class="timeline-viewport">
      <div class="h-10 bg-[var(--bg-surface)] border-b border-[var(--border-subtle)] relative flex items-end" id="ruler"></div>
      
      <div class="flex-1 relative" id="canvas-container">
        <canvas id="timeline-canvas"></canvas>
      </div>
      
      <div class="h-16 bg-[var(--bg-surface)] border-t border-[var(--border-subtle)] relative" id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
        <div class="absolute top-0 h-full bg-[rgba(45,212,191,0.05)] border-x border-[var(--accent-primary)] pointer-events-none" id="minimap-viewport"></div>
      </div>
    </main>
  </div>

  <div class="data-card hidden" id="tooltip"></div>

  <script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const CONFIG = {
      rowHeight: 24,
      rowGap: 2,
      viewWidthMs: 5000, 
      maxBufferMs: 15000,
      initialViewWidth: 5000
    };

    const THREAD_GROUPS_CONFIG = [
      { id: 'main', name: 'Main Process', color: '#2DD4BF', type: 'persistent' },
      { id: 'net', name: 'Network I/O', color: '#818CF8', type: 'ephemeral' },
      { id: 'db', name: 'Database Pool', color: '#FACC15', type: 'ephemeral' },
      { id: 'worker', name: 'Worker Threads', color: '#FB7185', type: 'ephemeral' }
    ];

    // ==========================================
    // VIEW CLASS
    // ==========================================
    class ProfilerView {
      constructor() {
        this.canvas = document.getElementById('timeline-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.container = document.getElementById('canvas-container');
        
        this.minimap = document.getElementById('minimap-canvas');
        this.minimapCtx = this.minimap.getContext('2d');
        this.minimapContainer = document.getElementById('minimap-container');
        this.minimapViewport = document.getElementById('minimap-viewport');
        
        this.ruler = document.getElementById('ruler');
        this.groupsEl = document.getElementById('thread-groups');
        this.tooltip = document.getElementById('tooltip');
        
        // State
        this.data = { threads: [], zones: [] };
        
        // Performance Optimization: Lookup Maps
        this.threadsMap = new Map(); // ID -> Thread
        this.groupLayouts = new Map();
        
        // View State
        this.liveMode = true;
        this.latestTime = 0;
        this.scrollY = 0; // Vertical scroll position
        
        this.viewStart = 0;
        this.viewEnd = CONFIG.initialViewWidth;
        
        this.isDragging = false;
        this.isSelecting = false;
        this.lastX = 0;
        this.selectionStart = null;
        this.selectionEnd = null;
        this.hoveredZone = null;

        // Connection Recovery State
        this.reconnectAttempts = 0;
        this.eventSource = null;
        this.reconnectTimer = null;

        // Init
        this.setupCanvas();
        this.renderSidebar(); 
        this.render();
        this.setupMinimap();
        this.bindEvents();
        this.connectStream();
      }

      setupCanvas() {
        const rect = this.container.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        
        this.canvas.width = rect.width * dpr;
        this.canvas.height = rect.height * dpr;
        this.canvas.style.width = `${rect.width}px`;
        this.canvas.style.height = `${rect.height}px`;
        
        this.ctx.scale(dpr, dpr);
        this.width = rect.width;
        this.height = rect.height;
      }

      setupMinimap() {
        const rect = this.minimapContainer.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        
        this.minimap.width = rect.width * dpr;
        this.minimap.height = rect.height * dpr;
        this.minimap.style.width = `${rect.width}px`;
        this.minimap.style.height = `${rect.height}px`;
        
        this.minimapCtx.scale(dpr, dpr);
        this.minimapWidth = rect.width;
        this.minimapHeight = rect.height;
        
        this.renderMinimap();
      }

      // --- Connection Handling with Recovery ---
      connectStream() {
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        if (this.eventSource) {
          this.eventSource.onopen = null;
          this.eventSource.onmessage = null;
          this.eventSource.onerror = null;
          this.eventSource.close();
          this.eventSource = null;
        }

        statusDot.className = "status-dot connecting";
        statusText.textContent = this.reconnectAttempts > 0 
          ? `Reconnecting (${this.reconnectAttempts})...` 
          : "Connecting...";

        this.eventSource = new EventSource('/stream');

        this.eventSource.onopen = () => {
          statusDot.className = "status-dot live";
          statusText.textContent = "LIVE";
          this.reconnectAttempts = 0;
          
          // Reset state for clean start
          this.data = { threads: [], zones: [] };
          this.threadsMap.clear();
          this.latestTime = 0;
          this.viewStart = 0;
          this.viewEnd = CONFIG.initialViewWidth;
          this.scrollY = 0;
          this.liveMode = true;
          document.getElementById('live-btn').classList.add('live-active');
        };

        this.eventSource.onmessage = (e) => {
          const payload = JSON.parse(e.data);
          
          if (payload.type === 'init') {
            this.setThreads(payload.threads);
            this.setZones(payload.zones);
          } else if (payload.type === 'chunk') {
            // Append data
            this.addThreads(payload.threads);
            this.addZones(payload.zones);
            
            this.latestTime = payload.time;
            
            if (this.liveMode) {
              this.viewEnd = this.latestTime;
              this.viewStart = this.latestTime - CONFIG.viewWidthMs;
            }
            
            this.pruneOldData();
            this.updateStats(payload.time);
          }
          
          this.calculateLayout();
          this.renderSidebar();
          this.renderRuler();
          this.render();
          this.renderMinimap();
        };

        this.eventSource.onerror = () => {
          this.scheduleReconnect();
        };
      }
      
      // Optimized data setters
      setThreads(threads) {
        this.data.threads = threads;
        this.threadsMap.clear();
        threads.forEach(t => this.threadsMap.set(t.id, t));
      }

      addThreads(threads) {
        this.data.threads.push(...threads);
        threads.forEach(t => this.threadsMap.set(t.id, t));
      }

      setZones(zones) {
        this.data.zones = zones;
      }

      addZones(zones) {
        this.data.zones.push(...zones);
      }

      scheduleReconnect() {
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        if (this.reconnectAttempts === 0 || !this.reconnectTimer) {
            statusDot.className = "status-dot error";
            statusText.textContent = "Disconnected";
        }

        if (this.reconnectTimer) clearTimeout(this.reconnectTimer);

        const delay = Math.min(30000, 1000 * Math.pow(2, this.reconnectAttempts));
        
        this.reconnectTimer = setTimeout(() => {
          this.reconnectAttempts++;
          this.connectStream();
        }, delay);
      }

      pruneOldData() {
        const cutoff = this.latestTime - CONFIG.maxBufferMs;
        
        if (this.latestTime > CONFIG.maxBufferMs) {
          // Prune Zones
          const oldLen = this.data.zones.length;
          this.data.zones = this.data.zones.filter(z => z.end > cutoff);
          
          // Prune Threads
          const oldThreadLen = this.data.threads.length;
          this.data.threads = this.data.threads.filter(t => t.end > cutoff);
          
          // Rebuild map if threads were removed
          if (this.data.threads.length !== oldThreadLen) {
             this.threadsMap.clear();
             this.data.threads.forEach(t => this.threadsMap.set(t.id, t));
          }
          
          if (this.viewStart < cutoff) {
             this.viewStart = cutoff;
          }
        }
      }

      updateStats(currentTime) {
        const secs = (currentTime / 1000).toFixed(1);
        document.getElementById('stat-time').textContent = `${secs}s`;
        
        const activity = Math.min(100, (this.data.zones.length % 100));
        document.getElementById('bar-time').style.width = `${activity}%`;
        
        const threadCount = this.data.threads.length;
        document.getElementById('stat-threads').textContent = threadCount;
        document.getElementById('bar-threads').style.width = `${Math.min(100, threadCount / 2)}%`;
      }

      calculateLayout() {
        this.groupLayouts.clear();
        
        THREAD_GROUPS_CONFIG.forEach(group => {
          const groupThreads = this.data.threads.filter(t => t.groupId === group.id);
          
          if (group.type === 'persistent') {
            this.groupLayouts.set(group.id, {
              rows: groupThreads.map((t, i) => ({ threadId: t.id, y: i })),
              totalHeight: groupThreads.length
            });
          } else {
            // Bin Packing
            const sorted = [...groupThreads].sort((a, b) => a.start - b.start);
            const rowEnds = [];
            const rows = [];

            sorted.forEach(thread => {
              let placed = false;
              for (let i = 0; i < rowEnds.length; i++) {
                if (thread.start >= rowEnds[i]) {
                  rows.push({ threadId: thread.id, y: i });
                  rowEnds[i] = thread.end;
                  placed = true;
                  break;
                }
              }
              if (!placed) {
                rows.push({ threadId: thread.id, y: rowEnds.length });
                rowEnds.push(thread.end);
              }
            });
            
            this.groupLayouts.set(group.id, { rows, totalHeight: Math.max(1, rowEnds.length) });
          }
        });
      }

      renderSidebar() {
        if (this.data.threads.length === 0) return;
        let html = '';
        
        THREAD_GROUPS_CONFIG.forEach(group => {
          const layout = this.groupLayouts.get(group.id);
          const count = layout ? layout.totalHeight : 0;

          html += `
            <div class="group-item">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <div class="w-1 h-6 rounded-sm" style="background: ${group.color}"></div>
                  <div>
                    <div class="text-sm font-medium text-[var(--text-primary)]">${group.name}</div>
                    <div class="text-[10px] text-[var(--text-muted)] mt-0.5 mono">
                      ${group.type === 'ephemeral' ? `${count} rows` : 'Primary'}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        this.groupsEl.innerHTML = html;
      }

      renderRuler() {
        const duration = this.viewEnd - this.viewStart;
        if (duration <= 0) return;
        
        const pxPerMs = this.width / duration;
        
        let interval = 500; 
        if (pxPerMs < 0.2) interval = 2000;
        if (pxPerMs > 1) interval = 200;
        if (pxPerMs > 5) interval = 50;
        
        let html = '';
        const startTick = Math.floor(this.viewStart / interval) * interval;
        
        for (let t = startTick; t <= this.viewEnd; t += interval) {
          const x = (t - this.viewStart) * pxPerMs;
          html += `
            <div class="absolute flex flex-col items-center pb-2" style="left: ${x}px; pointer-events: none;">
              <span class="mono text-[10px] text-[var(--text-muted)] tabular-nums mb-1">${(t/1000).toFixed(1)}s</span>
              <div class="w-px h-2 bg-[var(--border-default)]"></div>
            </div>
          `;
        }
        this.ruler.innerHTML = html;
      }

      render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.width, this.height);
        
        const duration = this.viewEnd - this.viewStart;
        if (duration <= 0) return;
        
        const pxPerMs = this.width / duration;
        
        ctx.fillStyle = '#08080a';
        ctx.fillRect(0, 0, this.width, this.height);
        
        let yCursor = -this.scrollY; // Apply vertical scroll
        
        THREAD_GROUPS_CONFIG.forEach(group => {
          const layout = this.groupLayouts.get(group.id);
          if (!layout) return;
          
          const groupHeight = layout.totalHeight * (CONFIG.rowHeight + CONFIG.rowGap);
          
          // Only render group if visible vertically
          if (yCursor + groupHeight > 0 && yCursor < this.height) {
              
              // Group Separator
              ctx.fillStyle = 'rgba(255,255,255,0.03)';
              ctx.fillRect(0, yCursor + groupHeight, this.width, 4);
              
              const threadMap = new Map(layout.rows.map(r => [r.threadId, r.y]));
              
              // Optimized Zone Filtering
              // 1. Filter by time (View)
              const zonesInView = this.data.zones.filter(z => 
                z.end >= this.viewStart && z.start <= this.viewEnd
              );

              // 2. Render Zones
              zonesInView.forEach(zone => {
                const rowY = threadMap.get(zone.threadId);
                if (rowY === undefined) return;

                // Check group (since we are iterating all zones)
                const thread = this.threadsMap.get(zone.threadId);
                if (!thread || thread.groupId !== group.id) return;

                const x = (zone.start - this.viewStart) * pxPerMs;
                const w = Math.max(1, (zone.end - zone.start) * pxPerMs);
                
                const y = yCursor + rowY * (CONFIG.rowHeight + CONFIG.rowGap) + 1;
                const h = CONFIG.rowHeight - 2;
                
                // Skip if off-screen vertically
                if (y + h < 0 || y > this.height) return;

                const isHovered = this.hoveredZone === zone;
                
                const color = this.parseColor(zone.color);
                const luminance = (0.299 * color.r + 0.587 * color.g + 0.114 * color.b) / 255;
                
                ctx.fillStyle = isHovered ? this.lightenColor(zone.color, 1.3) : zone.color;
                this.roundRect(ctx, x, y, w, h, 3);

                if (w > 40) {
                  ctx.fillStyle = luminance > 0.6 ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.9)';
                  ctx.font = '500 11px "JetBrains Mono"';
                  ctx.textBaseline = 'middle';
                  ctx.fillText(zone.name, x + 6, y + h/2 + 1);
                }
              });
          }
          
          yCursor += groupHeight + 8;
        });

        if (this.selectionStart !== null) {
          const x = Math.min(this.selectionStart, this.selectionEnd);
          const w = Math.abs(this.selectionEnd - this.selectionStart);
          
          ctx.fillStyle = 'rgba(45, 212, 191, 0.1)';
          ctx.fillRect(x, 0, w, this.height);
          ctx.strokeStyle = 'rgba(45, 212, 191, 0.8)';
          ctx.lineWidth = 1;
          ctx.strokeRect(x, 0, w, this.height);
        }
      }

      renderMinimap() {
        const ctx = this.minimapCtx;
        const w = this.minimapWidth;
        const h = this.minimapHeight;
        
        ctx.clearRect(0, 0, w, h);
        
        const range = CONFIG.maxBufferMs;
        if (range <= 0) return;
        
        const startView = this.latestTime - range;
        
        const buckets = 100;
        const bucketSize = range / buckets;
        const density = new Array(buckets).fill(0);
        
        this.data.zones.forEach(z => {
           const idx = Math.floor((z.start - startView) / bucketSize);
           if (idx >= 0 && idx < buckets) density[idx]++;
        });
        
        const maxD = Math.max(...density, 1);
        
        density.forEach((d, i) => {
           const bx = (i / buckets) * w;
           const bw = (w / buckets) + 1;
           const bh = (d / maxD) * (h - 10);
           
           const alpha = 0.1 + (d/maxD) * 0.5;
           ctx.fillStyle = `rgba(45, 212, 191, ${alpha})`;
           ctx.fillRect(bx, h - bh - 4, bw, bh);
        });
        
        const pxPerMs = w / range;
        const vpx = (this.viewStart - startView) * pxPerMs;
        const vpw = (this.viewEnd - this.viewStart) * pxPerMs;
        
        this.minimapViewport.style.left = `${vpx}px`;
        this.minimapViewport.style.width = `${vpw}px`;
      }

      roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
      }

      parseColor(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16)
        };
      }

      lightenColor(hex, factor) {
        const c = this.parseColor(hex);
        return `rgb(${Math.min(255, c.r * factor)}, ${Math.min(255, c.g * factor)}, ${Math.min(255, c.b * factor)})`;
      }

      getZoneAt(x, y) {
        const duration = this.viewEnd - this.viewStart;
        const pxPerMs = this.width / duration;
        const time = this.viewStart + x / pxPerMs;
        
        let yCursor = -this.scrollY;
        
        for (const group of THREAD_GROUPS_CONFIG) {
          const layout = this.groupLayouts.get(group.id);
          if (!layout) continue;
          
          const groupHeight = layout.totalHeight * (CONFIG.rowHeight + CONFIG.rowGap);
          
          if (y >= yCursor && y < yCursor + groupHeight) {
            const rowIdx = Math.floor((y - yCursor) / (CONFIG.rowHeight + CONFIG.rowGap));
            const row = layout.rows.find(r => r.y === rowIdx);
            
            if (row) {
              const thread = this.threadsMap.get(row.threadId);
              if (thread) {
                const zone = this.data.zones.find(z => 
                  z.threadId === thread.id && 
                  time >= z.start && 
                  time <= z.end
                );
                if (zone) return { zone, thread, group };
              }
            }
          }
          
          yCursor += groupHeight + 8;
        }
        return null;
      }

      showTooltip(e, data) {
        if (!data) return;
        const { zone, thread, group } = data;
        
        this.tooltip.innerHTML = `
          <div class="data-card-header">
            <div class="text-[10px] text-[var(--text-muted)] uppercase tracking-widest mb-1">${group.name}</div>
            <div class="text-base font-semibold mono text-[var(--text-primary)]">${zone.name}</div>
          </div>
          <div class="data-card-body">
            <div class="data-row">
              <span class="data-key">Duration</span>
              <span class="data-val highlight">${(zone.end - zone.start).toFixed(3)} ms</span>
            </div>
            <div class="data-row">
              <span class="data-key">Start Time</span>
              <span class="data-val">${(zone.start/1000).toFixed(2)} s</span>
            </div>
          </div>
        `;
        
        this.tooltip.classList.remove('hidden');
        this.updateTooltipPos(e);
      }

      updateTooltipPos(e) {
        let x = e.clientX + 20;
        let y = e.clientY + 20;
        
        const rect = this.tooltip.getBoundingClientRect();
        if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 20;
        if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 20;
        
        this.tooltip.style.left = `${x}px`;
        this.tooltip.style.top = `${y}px`;
      }

      hideTooltip() {
        this.tooltip.classList.add('hidden');
      }

      bindEvents() {
        this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
        window.addEventListener('mousemove', e => this.onMouseMove(e));
        window.addEventListener('mouseup', e => this.onMouseUp(e));
        this.canvas.addEventListener('wheel', e => this.onWheel(e), { passive: false });
        
        document.getElementById('reset-btn').addEventListener('click', () => {
             this.viewStart = Math.max(0, this.latestTime - CONFIG.maxBufferMs);
             this.viewEnd = this.latestTime;
             this.scrollY = 0;
             this.renderRuler(); this.render(); this.renderMinimap();
        });

        document.getElementById('live-btn').addEventListener('click', () => {
             this.liveMode = !this.liveMode;
             const btn = document.getElementById('live-btn');
             if (this.liveMode) btn.classList.add('live-active');
             else btn.classList.remove('live-active');
        });
        
        window.addEventListener('resize', () => {
          this.setupCanvas();
          this.setupMinimap();
          this.render();
        });
      }

      onMouseDown(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        
        if (this.liveMode) {
            this.liveMode = false;
            document.getElementById('live-btn').classList.remove('live-active');
        }
        
        if (e.shiftKey) {
          this.isSelecting = true;
          this.selectionStart = x;
          this.selectionEnd = x;
        } else {
          this.isDragging = true;
          this.lastX = x;
          this.canvas.style.cursor = 'grabbing';
        }
      }

      onMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (this.isDragging) {
          const dx = x - this.lastX;
          const duration = this.viewEnd - this.viewStart;
          const msPx = duration / this.width;
          
          const shift = -dx * msPx;
          this.viewStart = Math.max(0, this.viewStart + shift);
          this.viewEnd = this.viewEnd + shift; 
          
          this.lastX = x;
          this.renderRuler();
          this.render();
          this.renderMinimap();
        } else if (this.isSelecting) {
          this.selectionEnd = x;
          this.render();
        } else if (x >= 0 && x <= this.width && y >= 0 && y <= this.height) {
          const result = this.getZoneAt(x, y);
          if (result) {
            if (this.hoveredZone !== result.zone) {
              this.hoveredZone = result.zone;
              this.render();
            }
            this.showTooltip(e, result);
            this.canvas.style.cursor = 'pointer';
          } else {
            if (this.hoveredZone) {
              this.hoveredZone = null;
              this.render();
            }
            this.hideTooltip();
            this.canvas.style.cursor = 'crosshair';
          }
        } else {
          this.hideTooltip();
          this.canvas.style.cursor = 'crosshair';
        }
      }

      onMouseUp(e) {
        if (this.isSelecting && Math.abs(this.selectionEnd - this.selectionStart) > 5) {
          const duration = this.viewEnd - this.viewStart;
          const msPx = duration / this.width;
          
          const x1 = Math.min(this.selectionStart, this.selectionEnd);
          const x2 = Math.max(this.selectionStart, this.selectionEnd);
          
          this.viewStart = Math.max(0, this.viewStart + x1 * msPx);
          this.viewEnd = this.viewStart + (x2-x1) * msPx;
          
          this.renderRuler();
          this.render();
          this.renderMinimap();
        }
        
        this.isDragging = false;
        this.isSelecting = false;
        this.selectionStart = null;
        this.selectionEnd = null;
        this.canvas.style.cursor = 'crosshair';
        this.render();
      }

      onWheel(e) {
        e.preventDefault();
        
        // Handle Vertical Scroll
        if (e.shiftKey) {
            const totalHeight = this.getTotalLayoutHeight();
            const maxScroll = Math.max(0, totalHeight - this.height);
            this.scrollY += e.deltaY;
            this.scrollY = Math.max(0, Math.min(this.scrollY, maxScroll));
            this.render();
            return;
        }

        // Handle Zoom
        if (this.liveMode) {
            this.liveMode = false;
            document.getElementById('live-btn').classList.remove('live-active');
        }

        const rect = this.canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        
        const duration = this.viewEnd - this.viewStart;
        const msPx = duration / this.width;
        const mouseTime = this.viewStart + mouseX * msPx;
        
        const factor = e.deltaY > 0 ? 1.15 : 0.85;
        const newDur = Math.max(100, duration * factor);
        
        const ratio = (mouseTime - this.viewStart) / duration;
        
        this.viewStart = Math.max(0, mouseTime - newDur * ratio);
        this.viewEnd = this.viewStart + newDur;
        
        this.renderRuler();
        this.render();
        this.renderMinimap();
      }

      getTotalLayoutHeight() {
          let h = 0;
          this.groupLayouts.forEach(g => {
              h += g.totalHeight * (CONFIG.rowHeight + CONFIG.rowGap) + 8;
          });
          return h;
      }
    }

    window.addEventListener('DOMContentLoaded', () => new ProfilerView());
  </script>
</body>
</html>
