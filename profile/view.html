<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profiling Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #08080a;
      --bg-surface: #101014;
      --bg-elevated: #18181c;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --text-primary: #FFFFFF;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --accent-primary: #2DD4BF;
      --accent-secondary: #FACC15;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

    /* App Layout */
    .app-header {
      height: 48px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .timeline-viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-base);
    }

    /* Premium Stats Typography */
    .metric-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .metric-value {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
      font-feature-settings: 'tnum' on, 'lnum' on;
    }

    .metric-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .progress-track {
      height: 2px;
      background: var(--bg-base);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Thread Group Sidebar */
    .group-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s ease;
      cursor: pointer;
    }
    
    .group-item:hover {
      background: var(--bg-elevated);
    }

    /* Tooltip Premium Card */
    .data-card {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: 0;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      width: 280px;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .data-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(0,0,0,0.2);
    }

    .data-card-body {
      padding: 16px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    
    .data-row:last-child { margin-bottom: 0; }

    .data-key {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .data-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      text-align: right;
    }

    .data-val.highlight {
      color: var(--accent-primary);
      font-weight: 600;
    }

    /* Controls */
    .control-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }

    .control-btn:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
    }

    .control-btn.active {
      background: var(--text-primary);
      color: var(--bg-base);
      border-color: var(--text-primary);
    }

    canvas { display: block; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-[var(--accent-primary)]"></div>
        <span class="text-sm font-semibold tracking-tight">Profile Session</span>
        <span class="text-xs text-[var(--text-muted)] mono">2024-11-14_14-22-05</span>
      </div>
    </div>
    
    <div class="flex items-center gap-3">
      <button id="reset-btn" class="control-btn">Reset View</button>
      <div class="flex gap-1">
        <button class="control-btn active view-mode-btn" data-mode="stacked">Stacked</button>
        <button class="control-btn view-mode-btn" data-mode="flat">Flat</button>
      </div>
    </div>
  </header>

  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Performance Metrics -->
      <div class="metric-card">
        <div class="flex justify-between items-end mb-1">
          <div class="metric-label">Frame Time</div>
          <div class="text-[10px] mono text-[var(--text-muted)]">Target: 16.6ms</div>
        </div>
        <div class="metric-value" id="stat-frame">16.2</div>
        <div class="text-[10px] text-[var(--text-muted)] mb-3">milliseconds</div>
        <div class="progress-track">
          <div class="progress-fill bg-[var(--accent-primary)]" id="bar-frame" style="width: 60%"></div>
        </div>
      </div>

      <div class="metric-card">
        <div class="metric-label">CPU Load</div>
        <div class="metric-value" id="stat-cpu">42<span class="text-lg text-[var(--text-muted)]">%</span></div>
        <div class="progress-track">
          <div class="progress-fill bg-[var(--accent-secondary)]" id="bar-cpu" style="width: 42%"></div>
        </div>
      </div>

      <!-- Thread Groups -->
      <div class="flex-1 overflow-y-auto mt-2" id="thread-groups">
        <!-- Injected by JS -->
      </div>
    </aside>

    <!-- Main Timeline -->
    <main class="timeline-viewport">
      <!-- Ruler -->
      <div class="h-10 bg-[var(--bg-surface)] border-b border-[var(--border-subtle)] relative flex items-end" id="ruler"></div>
      
      <!-- Canvas -->
      <div class="flex-1 relative" id="canvas-container">
        <canvas id="timeline-canvas"></canvas>
      </div>
      
      <!-- Minimap -->
      <div class="h-16 bg-[var(--bg-surface)] border-t border-[var(--border-subtle)] relative" id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
        <div class="absolute top-0 h-full bg-[rgba(45,212,191,0.05)] border-x border-[var(--accent-primary)] pointer-events-none" id="minimap-viewport"></div>
      </div>
    </main>
  </div>

  <!-- Tooltip / Data Card -->
  <div class="data-card hidden" id="tooltip"></div>

  <script>
    // ==========================================
    // CONFIGURATION & DATA
    // ==========================================
    const CONFIG = {
      rowHeight: 24,
      rowGap: 2,
      totalDuration: 5000, // 5 seconds
      initialViewWidth: 120
    };

    const THREAD_GROUPS = [
      { id: 'main', name: 'Main Process', color: '#2DD4BF', type: 'persistent', threadCount: 1 },
      { id: 'net', name: 'Network I/O', color: '#818CF8', type: 'ephemeral', threadCount: 142 },
      { id: 'db', name: 'Database Pool', color: '#FACC15', type: 'ephemeral', threadCount: 32 },
      { id: 'worker', name: 'Worker Threads', color: '#FB7185', type: 'ephemeral', threadCount: 64 }
    ];

    const FUNC_NAMES = {
      main: ['ProcessEvent', 'UpdateState', 'RenderFrame', 'ComputeLayout', 'GC Collect'],
      net: ['HTTP Parse', 'TLS Handshake', 'Read Socket', 'Write Buffer', 'Compress'],
      db: ['Query Plan', 'Index Scan', 'Fetch Rows', 'Commit', 'Rollback'],
      worker: ['Hash Compute', 'Image Resize', 'Data Parse', 'Encrypt', 'Cleanup']
    };

    // Data generation (same as before)
    function generateData() {
      const threads = [];
      const zones = [];
      let threadId = 0;

      THREAD_GROUPS.forEach(group => {
        if (group.type === 'persistent') {
          threads.push({ id: threadId, name: group.name, groupId: group.id, start: 0, end: CONFIG.totalDuration, color: group.color });
          let t = 0;
          while (t < CONFIG.totalDuration) {
            const dur = 0.8 + Math.random() * 5;
            zones.push({
              threadId,
              name: FUNC_NAMES.main[Math.floor(Math.random() * FUNC_NAMES.main.length)],
              start: t,
              end: t + dur,
              depth: Math.floor(Math.random() * 3),
              color: group.color
            });
            t += dur + Math.random() * 2;
          }
          threadId++;
        } else {
          let lastStart = 0;
          for (let i = 0; i < group.threadCount; i++) {
            const start = lastStart + Math.random() * 25;
            const duration = 2 + Math.random() * 20;
            if (start >= CONFIG.totalDuration) break;

            threads.push({
              id: threadId,
              name: `${group.name} #${i+1}`,
              groupId: group.id,
              start,
              end: start + duration,
              color: group.color
            });

            let zt = start;
            const funcs = FUNC_NAMES[group.id] || FUNC_NAMES.worker;
            while (zt < start + duration) {
              const zDur = 0.4 + Math.random() * 2;
              zones.push({
                threadId,
                name: funcs[Math.floor(Math.random() * funcs.length)],
                start: zt,
                end: Math.min(zt + zDur, start + duration),
                depth: Math.floor(Math.random() * 2),
                color: group.color
              });
              zt += zDur * 0.8;
            }

            threadId++;
            lastStart = start + duration + (group.activity === 'burst' ? 0 : Math.random() * 50);
          }
        }
      });

      return { threads, zones };
    }

    // ==========================================
    // VIEW CLASS
    // ==========================================
    class ProfilerView {
      constructor() {
        this.canvas = document.getElementById('timeline-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.container = document.getElementById('canvas-container');
        
        this.minimap = document.getElementById('minimap-canvas');
        this.minimapCtx = this.minimap.getContext('2d');
        this.minimapContainer = document.getElementById('minimap-container');
        this.minimapViewport = document.getElementById('minimap-viewport');
        
        this.ruler = document.getElementById('ruler');
        this.groupsEl = document.getElementById('thread-groups');
        this.tooltip = document.getElementById('tooltip');
        
        // State
        this.data = generateData();
        this.viewMode = 'stacked';
        this.groupLayouts = new Map();
        
        this.viewStart = 0;
        this.viewEnd = CONFIG.initialViewWidth;
        
        this.isDragging = false;
        this.isSelecting = false;
        this.lastX = 0;
        this.selectionStart = null;
        this.selectionEnd = null;
        this.hoveredZone = null;

        // Init
        this.setupCanvas();
        this.calculateLayout();
        this.renderSidebar();
        this.renderRuler();
        this.render();
        this.setupMinimap();
        this.bindEvents();
        this.startLiveStats();
      }

      setupCanvas() {
        const rect = this.container.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        
        this.canvas.width = rect.width * dpr;
        this.canvas.height = rect.height * dpr;
        this.canvas.style.width = `${rect.width}px`;
        this.canvas.style.height = `${rect.height}px`;
        
        this.ctx.scale(dpr, dpr);
        this.width = rect.width;
        this.height = rect.height;
      }

      setupMinimap() {
        const rect = this.minimapContainer.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        
        this.minimap.width = rect.width * dpr;
        this.minimap.height = rect.height * dpr;
        this.minimap.style.width = `${rect.width}px`;
        this.minimap.style.height = `${rect.height}px`;
        
        this.minimapCtx.scale(dpr, dpr);
        this.minimapWidth = rect.width;
        this.minimapHeight = rect.height;
        
        this.renderMinimap();
      }

      calculateLayout() {
        this.groupLayouts.clear();
        
        THREAD_GROUPS.forEach(group => {
          const groupThreads = this.data.threads.filter(t => t.groupId === group.id);
          
          if (group.type === 'persistent' || this.viewMode === 'flat') {
            this.groupLayouts.set(group.id, {
              rows: groupThreads.map((t, i) => ({ threadId: t.id, y: i })),
              totalHeight: groupThreads.length
            });
          } else {
            // Bin Packing
            const sorted = [...groupThreads].sort((a, b) => a.start - b.start);
            const rowEnds = [];
            const rows = [];

            sorted.forEach(thread => {
              let placed = false;
              for (let i = 0; i < rowEnds.length; i++) {
                if (thread.start >= rowEnds[i]) {
                  rows.push({ threadId: thread.id, y: i });
                  rowEnds[i] = thread.end;
                  placed = true;
                  break;
                }
              }
              if (!placed) {
                rows.push({ threadId: thread.id, y: rowEnds.length });
                rowEnds.push(thread.end);
              }
            });
            
            this.groupLayouts.set(group.id, { rows, totalHeight: Math.max(1, rowEnds.length) });
          }
        });
      }

      renderSidebar() {
        let html = '';
        THREAD_GROUPS.forEach(group => {
          const layout = this.groupLayouts.get(group.id);
          const count = layout ? layout.totalHeight : 0;
          const total = this.data.threads.filter(t => t.groupId === group.id).length;

          html += `
            <div class="group-item">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <div class="w-1 h-6 rounded-sm" style="background: ${group.color}"></div>
                  <div>
                    <div class="text-sm font-medium text-[var(--text-primary)]">${group.name}</div>
                    <div class="text-[10px] text-[var(--text-muted)] mt-0.5 mono">
                      ${group.type === 'ephemeral' ? `${count} rows (${total} threads)` : 'Primary'}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        this.groupsEl.innerHTML = html;
      }

      renderRuler() {
        const duration = this.viewEnd - this.viewStart;
        const pxPerMs = this.width / duration;
        
        let interval = 0.01;
        while (interval * pxPerMs < 100) interval *= 2;
        while (interval * pxPerMs > 250) interval /= 2;
        
        let html = '';
        const startTick = Math.floor(this.viewStart / interval) * interval;
        
        for (let t = startTick; t <= this.viewEnd; t += interval) {
          const x = (t - this.viewStart) * pxPerMs;
          html += `
            <div class="absolute flex flex-col items-center pb-2" style="left: ${x}px; pointer-events: none;">
              <span class="mono text-[10px] text-[var(--text-muted)] tabular-nums mb-1">${this.formatTime(t)}</span>
              <div class="w-px h-2 bg-[var(--border-default)]"></div>
            </div>
          `;
        }
        this.ruler.innerHTML = html;
      }

      formatTime(ms) {
        if (ms < 1) return `${(ms * 1000).toFixed(0)}µs`;
        return `${ms.toFixed(1)}ms`;
      }

      render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.width, this.height);
        
        const duration = this.viewEnd - this.viewStart;
        const pxPerMs = this.width / duration;
        
        ctx.fillStyle = '#08080a';
        ctx.fillRect(0, 0, this.width, this.height);
        
        let yCursor = 0;
        
        THREAD_GROUPS.forEach(group => {
          const layout = this.groupLayouts.get(group.id);
          if (!layout) return;
          
          const groupHeight = layout.totalHeight * (CONFIG.rowHeight + CONFIG.rowGap);
          
          // Group Separator
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
          ctx.fillRect(0, yCursor + groupHeight, this.width, 4);
          
          const threadMap = new Map(layout.rows.map(r => [r.threadId, r.y]));
          const groupZones = this.data.zones.filter(z => {
            const t = this.data.threads.find(th => th.id === z.threadId);
            return t && t.groupId === group.id;
          });

          groupZones.forEach(zone => {
            const rowY = threadMap.get(zone.threadId);
            if (rowY === undefined) return;

            const x = (zone.start - this.viewStart) * pxPerMs;
            const w = Math.max(1, (zone.end - zone.start) * pxPerMs);
            
            if (x + w < 0 || x > this.width) return;

            const y = yCursor + rowY * (CONFIG.rowHeight + CONFIG.rowGap) + 1;
            const h = CONFIG.rowHeight - 2;
            
            const isHovered = this.hoveredZone === zone;
            
            // Premium Color Logic
            const color = this.parseColor(zone.color);
            const luminance = (0.299 * color.r + 0.587 * color.g + 0.114 * color.b) / 255;
            
            // Zone Fill
            ctx.fillStyle = isHovered ? this.lightenColor(zone.color, 1.3) : zone.color;
            this.roundRect(ctx, x, y, w, h, 3);

            // Typography on Canvas
            if (w > 40) {
              // Choose text color based on background luminance
              ctx.fillStyle = luminance > 0.6 ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.9)';
              ctx.font = '500 11px "JetBrains Mono"';
              ctx.textBaseline = 'middle';
              ctx.fillText(zone.name, x + 6, y + h/2 + 1);
            }
          });
          
          yCursor += groupHeight + 8;
        });

        // Selection Box
        if (this.selectionStart !== null) {
          const x = Math.min(this.selectionStart, this.selectionEnd);
          const w = Math.abs(this.selectionEnd - this.selectionStart);
          
          ctx.fillStyle = 'rgba(45, 212, 191, 0.1)';
          ctx.fillRect(x, 0, w, this.height);
          ctx.strokeStyle = 'rgba(45, 212, 191, 0.8)';
          ctx.lineWidth = 1;
          ctx.strokeRect(x, 0, w, this.height);
        }
      }

      renderMinimap() {
        const ctx = this.minimapCtx;
        const w = this.minimapWidth;
        const h = this.minimapHeight;
        
        ctx.clearRect(0, 0, w, h);
        
        const buckets = 150;
        const bucketSize = CONFIG.totalDuration / buckets;
        const density = new Array(buckets).fill(0);
        
        this.data.zones.forEach(z => {
           const start = Math.floor(z.start / bucketSize);
           const end = Math.floor(z.end / bucketSize);
           for (let i = Math.max(0, start); i <= Math.min(end, buckets-1); i++) density[i]++;
        });
        
        const maxD = Math.max(...density, 1);
        
        density.forEach((d, i) => {
           const bx = (i / buckets) * w;
           const bw = (w / buckets) + 1;
           const bh = (d / maxD) * (h - 10);
           
           const alpha = 0.1 + (d/maxD) * 0.5;
           ctx.fillStyle = `rgba(45, 212, 191, ${alpha})`;
           ctx.fillRect(bx, h - bh - 4, bw, bh);
        });
        
        const pxPerMs = w / CONFIG.totalDuration;
        const vpx = this.viewStart * pxPerMs;
        const vpw = (this.viewEnd - this.viewStart) * pxPerMs;
        
        this.minimapViewport.style.left = `${vpx}px`;
        this.minimapViewport.style.width = `${vpw}px`;
      }

      roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
      }

      parseColor(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16)
        };
      }

      lightenColor(hex, factor) {
        const c = this.parseColor(hex);
        return `rgb(${Math.min(255, c.r * factor)}, ${Math.min(255, c.g * factor)}, ${Math.min(255, c.b * factor)})`;
      }

      // Interaction Logic (Same as before)
      getZoneAt(x, y) {
        const duration = this.viewEnd - this.viewStart;
        const pxPerMs = this.width / duration;
        const time = this.viewStart + x / pxPerMs;
        
        let yCursor = 0;
        
        for (const group of THREAD_GROUPS) {
          const layout = this.groupLayouts.get(group.id);
          if (!layout) continue;
          
          const groupHeight = layout.totalHeight * (CONFIG.rowHeight + CONFIG.rowGap);
          
          if (y >= yCursor && y < yCursor + groupHeight) {
            const rowIdx = Math.floor((y - yCursor) / (CONFIG.rowHeight + CONFIG.rowGap));
            const row = layout.rows.find(r => r.y === rowIdx);
            
            if (row) {
              const thread = this.data.threads.find(t => t.id === row.threadId);
              if (thread) {
                const zone = this.data.zones.find(z => 
                  z.threadId === thread.id && 
                  time >= z.start && 
                  time <= z.end
                );
                if (zone) return { zone, thread, group };
              }
            }
          }
          
          yCursor += groupHeight + 8;
        }
        return null;
      }

      showTooltip(e, data) {
        if (!data) return;
        const { zone, thread, group } = data;
        
        this.tooltip.innerHTML = `
          <div class="data-card-header">
            <div class="text-[10px] text-[var(--text-muted)] uppercase tracking-widest mb-1">${group.name}</div>
            <div class="text-base font-semibold mono text-[var(--text-primary)]">${zone.name}</div>
          </div>
          <div class="data-card-body">
            <div class="data-row">
              <span class="data-key">Duration</span>
              <span class="data-val highlight">${(zone.end - zone.start).toFixed(3)} ms</span>
            </div>
            <div class="data-row">
              <span class="data-key">Start Time</span>
              <span class="data-val">${zone.start.toFixed(2)} ms</span>
            </div>
            <div class="data-row">
              <span class="data-key">Thread</span>
              <span class="data-val">${thread.name}</span>
            </div>
            <div class="data-row">
              <span class="data-key">Depth</span>
              <span class="data-val">${zone.depth}</span>
            </div>
          </div>
        `;
        
        this.tooltip.classList.remove('hidden');
        this.updateTooltipPos(e);
      }

      updateTooltipPos(e) {
        let x = e.clientX + 20;
        let y = e.clientY + 20;
        
        const rect = this.tooltip.getBoundingClientRect();
        if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 20;
        if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 20;
        
        this.tooltip.style.left = `${x}px`;
        this.tooltip.style.top = `${y}px`;
      }

      hideTooltip() {
        this.tooltip.classList.add('hidden');
      }

      bindEvents() {
        this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
        window.addEventListener('mousemove', e => this.onMouseMove(e));
        window.addEventListener('mouseup', e => this.onMouseUp(e));
        this.canvas.addEventListener('wheel', e => this.onWheel(e), { passive: false });
        
        document.getElementById('reset-btn').addEventListener('click', () => this.resetView());
        document.querySelectorAll('.view-mode-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
             document.querySelectorAll('.view-mode-btn').forEach(b => b.classList.remove('active'));
             e.target.classList.add('active');
             this.viewMode = e.target.dataset.mode;
             this.calculateLayout();
             this.renderSidebar();
             this.render();
          });
        });
        
        window.addEventListener('resize', () => {
          this.setupCanvas();
          this.setupMinimap();
          this.render();
        });
      }

      onMouseDown(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        
        if (e.shiftKey) {
          this.isSelecting = true;
          this.selectionStart = x;
          this.selectionEnd = x;
        } else {
          this.isDragging = true;
          this.lastX = x;
          this.canvas.style.cursor = 'grabbing';
        }
      }

      onMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (this.isDragging) {
          const dx = x - this.lastX;
          const duration = this.viewEnd - this.viewStart;
          const msPx = duration / this.width;
          
          const shift = -dx * msPx;
          this.viewStart = Math.max(0, this.viewStart + shift);
          this.viewEnd = Math.min(CONFIG.totalDuration, this.viewEnd + shift);
          
          if (this.viewStart === 0 && shift < 0) this.viewEnd = duration;
          if (this.viewEnd === CONFIG.totalDuration && shift > 0) this.viewStart = CONFIG.totalDuration - duration;
          
          this.lastX = x;
          this.renderRuler();
          this.render();
          this.renderMinimap();
        } else if (this.isSelecting) {
          this.selectionEnd = x;
          this.render();
        } else if (x >= 0 && x <= this.width && y >= 0 && y <= this.height) {
          const result = this.getZoneAt(x, y);
          if (result) {
            if (this.hoveredZone !== result.zone) {
              this.hoveredZone = result.zone;
              this.render();
            }
            this.showTooltip(e, result);
            this.canvas.style.cursor = 'pointer';
          } else {
            if (this.hoveredZone) {
              this.hoveredZone = null;
              this.render();
            }
            this.hideTooltip();
            this.canvas.style.cursor = 'crosshair';
          }
        } else {
          this.hideTooltip();
          this.canvas.style.cursor = 'crosshair';
        }
      }

      onMouseUp(e) {
        if (this.isSelecting && Math.abs(this.selectionEnd - this.selectionStart) > 5) {
          const duration = this.viewEnd - this.viewStart;
          const msPx = duration / this.width;
          
          const x1 = Math.min(this.selectionStart, this.selectionEnd);
          const x2 = Math.max(this.selectionStart, this.selectionEnd);
          
          this.viewStart = Math.max(0, this.viewStart + x1 * msPx);
          this.viewEnd = Math.min(CONFIG.totalDuration, this.viewStart + (x2-x1) * msPx);
          
          this.renderRuler();
          this.render();
          this.renderMinimap();
        }
        
        this.isDragging = false;
        this.isSelecting = false;
        this.selectionStart = null;
        this.selectionEnd = null;
        this.canvas.style.cursor = 'crosshair';
        this.render();
      }

      onWheel(e) {
        e.preventDefault();
        const rect = this.canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        
        const duration = this.viewEnd - this.viewStart;
        const msPx = duration / this.width;
        const mouseTime = this.viewStart + mouseX * msPx;
        
        const factor = e.deltaY > 0 ? 1.15 : 0.85;
        const newDur = Math.min(CONFIG.totalDuration, Math.max(0.1, duration * factor));
        
        const ratio = (mouseTime - this.viewStart) / duration;
        
        this.viewStart = Math.max(0, mouseTime - newDur * ratio);
        this.viewEnd = Math.min(CONFIG.totalDuration, this.viewStart + newDur);
        
        if (this.viewEnd === CONFIG.totalDuration) this.viewStart = this.viewEnd - newDur;
        if (this.viewStart < 0) this.viewStart = 0;
        
        this.renderRuler();
        this.render();
        this.renderMinimap();
      }

      resetView() {
        this.viewStart = 0;
        this.viewEnd = CONFIG.initialViewWidth;
        this.renderRuler();
        this.render();
        this.renderMinimap();
      }

      startLiveStats() {
        setInterval(() => {
          const frame = 14 + Math.random() * 6;
          const cpu = 30 + Math.random() * 30;
          
          document.getElementById('stat-frame').textContent = frame.toFixed(1);
          document.getElementById('bar-frame').style.width = `${Math.min(100, frame/16*100)}%`;
          
          document.getElementById('stat-cpu').innerHTML = `${cpu.toFixed(0)}<span class="text-lg text-[var(--text-muted)]">%</span>`;
          document.getElementById('bar-cpu').style.width = `${cpu}%`;
        }, 600);
      }
    }

    window.addEventListener('DOMContentLoaded', () => new ProfilerView());
  </script>
</body>
</html>
