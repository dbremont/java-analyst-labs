<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --bg-elevated: #0d1219;
      --bg-card: #111820;
      --fg: #e6edf3;
      --fg-muted: #6b7a8c;
      --accent: #00d9ff;
      --accent-dim: rgba(0, 217, 255, 0.15);
      --border: #1c2836;
      --info: #00b4d8;
      --debug: #6b7a8c;
      --warn: #f0b429;
      --error: #ff5757;
      --success: #00c853;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      min-height: 100vh;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 217, 255, 0.08), transparent),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 100%);
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--fg-muted);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .animate-slide-in {
      animation: slideIn 0.4s ease-out forwards;
    }

    .stagger-1 { animation-delay: 0.1s; opacity: 0; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; }
    .stagger-4 { animation-delay: 0.4s; opacity: 0; }

    /* Log entry hover */
    .log-entry {
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .log-entry:hover {
      background: rgba(0, 217, 255, 0.03);
      border-left-color: var(--accent);
    }

    .log-entry.level-info:hover { border-left-color: var(--info); }
    .log-entry.level-debug:hover { border-left-color: var(--debug); }
    .log-entry.level-warn:hover { border-left-color: var(--warn); }
    .log-entry.level-error:hover { border-left-color: var(--error); }

    /* Level badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-info {
      background: rgba(0, 180, 216, 0.15);
      color: var(--info);
    }
    .badge-debug {
      background: rgba(107, 122, 140, 0.2);
      color: var(--debug);
    }
    .badge-warn {
      background: rgba(240, 180, 41, 0.15);
      color: var(--warn);
    }
    .badge-error {
      background: rgba(255, 87, 87, 0.15);
      color: var(--error);
    }

    /* Filter buttons */
    .filter-btn {
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .filter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .filter-btn:hover::before {
      opacity: 0.1;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Search input */
    .search-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* Stat cards */
    .stat-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(17, 24, 32, 0.5) 100%);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
    }

    /* Highlight search */
    .highlight {
      background: rgba(240, 180, 41, 0.3);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* Live indicator */
    .live-indicator {
      animation: pulse 2s infinite;
    }

    /* Grid pattern overlay */
    .grid-pattern {
      background-image: 
        linear-gradient(rgba(28, 40, 54, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28, 40, 54, 0.3) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Focus visible */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body class="grid-pattern">
  <!-- Header -->
  <header class="sticky top-0 z-50 backdrop-blur-xl bg-[rgba(10,14,20,0.8)] border-b border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="flex items-center gap-3 animate-fade-in-up">
          <div class="relative">
            <svg class="w-8 h-8 text-[var(--accent)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <line x1="10" y1="9" x2="8" y2="9"/>
            </svg>
            <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-[var(--success)] rounded-full live-indicator"></span>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight">Log Viewer</h1>
            <p class="text-xs text-[var(--fg-muted)]">WildFly Server Logs</p>
          </div>
        </div>

        <!-- Search -->
        <div class="relative flex-1 max-w-md animate-fade-in-up stagger-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--fg-muted)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input 
            type="text" 
            id="searchInput"
            class="search-input w-full pl-10 pr-4 py-2.5 rounded-lg text-sm font-mono text-[var(--fg)] placeholder-[var(--fg-muted)]"
            placeholder="Search logs..."
            aria-label="Search logs"
          >
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-2 animate-fade-in-up stagger-2">
          <button 
            id="clearSearch"
            class="px-3 py-2 text-xs font-medium text-[var(--fg-muted)] hover:text-[var(--fg)] border border-[var(--border)] rounded-lg transition-colors"
            aria-label="Clear search"
          >
            Clear
          </button>
          <button 
            id="exportBtn"
            class="px-3 py-2 text-xs font-medium text-[var(--accent)] border border-[var(--accent)] rounded-lg hover:bg-[var(--accent-dim)] transition-colors"
            aria-label="Export logs"
          >
            Export
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <!-- Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div class="stat-card rounded-xl p-4 animate-fade-in-up stagger-1">
        <div class="flex items-center justify-between">
          <span class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">Total</span>
          <svg class="w-4 h-4 text-[var(--fg-muted)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <p class="text-2xl font-bold mt-1" id="totalCount">0</p>
      </div>

      <div class="stat-card rounded-xl p-4 animate-fade-in-up stagger-2">
        <div class="flex items-center justify-between">
          <span class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">INFO</span>
          <span class="w-2 h-2 rounded-full bg-[var(--info)]"></span>
        </div>
        <p class="text-2xl font-bold mt-1 text-[var(--info)]" id="infoCount">0</p>
      </div>

      <div class="stat-card rounded-xl p-4 animate-fade-in-up stagger-3">
        <div class="flex items-center justify-between">
          <span class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">DEBUG</span>
          <span class="w-2 h-2 rounded-full bg-[var(--debug)]"></span>
        </div>
        <p class="text-2xl font-bold mt-1 text-[var(--debug)]" id="debugCount">0</p>
      </div>

      <div class="stat-card rounded-xl p-4 animate-fade-in-up stagger-4">
        <div class="flex items-center justify-between">
          <span class="text-xs text-[var(--fg-muted)] uppercase tracking-wider">Filtered</span>
          <svg class="w-4 h-4 text-[var(--fg-muted)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </div>
        <p class="text-2xl font-bold mt-1 text-[var(--accent)]" id="filteredCount">0</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-2 mb-4 animate-fade-in-up stagger-3">
      <span class="text-xs text-[var(--fg-muted)] uppercase tracking-wider mr-2">Filter:</span>
      <button class="filter-btn active px-3 py-1.5 text-xs font-medium border border-[var(--border)] rounded-md" data-level="all">
        All
      </button>
      <button class="filter-btn px-3 py-1.5 text-xs font-medium border border-[var(--border)] rounded-md text-[var(--info)]" data-level="INFO">
        INFO
      </button>
      <button class="filter-btn px-3 py-1.5 text-xs font-medium border border-[var(--border)] rounded-md text-[var(--debug)]" data-level="DEBUG">
        DEBUG
      </button>
      <button class="filter-btn px-3 py-1.5 text-xs font-medium border border-[var(--border)] rounded-md text-[var(--warn)]" data-level="WARN">
        WARN
      </button>
      <button class="filter-btn px-3 py-1.5 text-xs font-medium border border-[var(--border)] rounded-md text-[var(--error)]" data-level="ERROR">
        ERROR
      </button>
    </div>

    <!-- Log Container -->
    <div class="bg-[var(--bg-card)] border border-[var(--border)] rounded-xl overflow-hidden animate-fade-in-up stagger-4">
      <!-- Log header -->
      <div class="px-4 py-3 border-b border-[var(--border)] bg-[rgba(0,0,0,0.2)] flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="flex gap-1.5">
            <span class="w-3 h-3 rounded-full bg-[#ff5f57]"></span>
            <span class="w-3 h-3 rounded-full bg-[#febc2e]"></span>
            <span class="w-3 h-3 rounded-full bg-[#28c840]"></span>
          </div>
          <span class="text-xs text-[var(--fg-muted)] font-mono">server.log</span>
        </div>
        <div class="flex items-center gap-2 text-xs text-[var(--fg-muted)]">
          <span id="timestamp">2026-04-15</span>
          <span class="w-1.5 h-1.5 rounded-full bg-[var(--success)] live-indicator"></span>
          <span>Live</span>
        </div>
      </div>

      <!-- Log entries -->
      <div id="logContainer" class="divide-y divide-[var(--border)] max-h-[60vh] overflow-y-auto">
        <!-- Logs will be rendered here -->
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="hidden px-4 py-12 text-center">
        <svg class="w-12 h-12 mx-auto text-[var(--fg-muted)] opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
          <path d="M8 11h6"/>
        </svg>
        <p class="mt-4 text-[var(--fg-muted)]">No logs match your search</p>
      </div>
    </div>

    <!-- Footer info -->
    <div class="mt-4 flex items-center justify-between text-xs text-[var(--fg-muted)]">
      <span>Showing <span id="showingCount">0</span> entries</span>
      <span class="font-mono">v1.0.0</span>
    </div>
  </main>

  <script>
    // Raw log data
    const rawLogs = `2026-04-15 00:00:03,348 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,347 DEBUG DefaultRolloverStrategy.purgeAscending deleting /wildfly/standalone/log/sql-2026-04-14-1.gz at low index 1: all slots full.
2026-04-15 00:00:03,351 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,351 DEBUG DefaultRolloverStrategy.purgeAscending executing 5 of 6: FileRenameAction[/wildfly/standalone/log/sql-2026-04-14-2.gz to /wildfly/standalone/log/sql-2026-04-14-1.gz, renameEmptyFiles=true]
2026-04-15 00:00:03,357 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,357 DEBUG DefaultRolloverStrategy.purgeAscending executing 4 of 6: FileRenameAction[/wildfly/standalone/log/sql-2026-04-14-3.gz to /wildfly/standalone/log/sql-2026-04-14-2.gz, renameEmptyFiles=true]
2026-04-15 00:00:03,358 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,358 DEBUG DefaultRolloverStrategy.purgeAscending executing 3 of 6: FileRenameAction[/wildfly/standalone/log/sql-2026-04-14-4.gz to /wildfly/standalone/log/sql-2026-04-14-3.gz, renameEmptyFiles=true]
2026-04-15 00:00:03,359 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,359 DEBUG DefaultRolloverStrategy.purgeAscending executing 2 of 6: FileRenameAction[/wildfly/standalone/log/sql-2026-04-14-5.gz to /wildfly/standalone/log/sql-2026-04-14-4.gz, renameEmptyFiles=true]
2026-04-15 00:00:03,359 INFO  [stdout] (default task-479) 2026-04-15 00:00:03,359 DEBUG DefaultRolloverStrategy.purgeAscending executing 1 of 6: FileRenameAction[/wildfly/standalone/log/sql-2026-04-14-6.gz to /wildfly/standalone/log/sql-2026-04-14-5.gz, renameEmptyFiles=true]`;

    // Parse logs
    function parseLogs(rawText) {
      const lines = rawText.trim().split('\n');
      const logPattern = /^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\s+(INFO|DEBUG|WARN|ERROR)\s+\[([^\]]+)\]\s+\(([^)]+)\)\s+(.*)$/;
      
      return lines.map((line, index) => {
        const match = line.match(logPattern);
        if (match) {
          return {
            id: index,
            timestamp: match[1],
            level: match[2],
            logger: match[3],
            thread: match[4],
            message: match[5],
            raw: line
          };
        }
        return {
          id: index,
          timestamp: '',
          level: 'INFO',
          logger: '',
          thread: '',
          message: line,
          raw: line
        };
      });
    }

    // State
    let logs = parseLogs(rawLogs);
    let filteredLogs = [...logs];
    let currentFilter = 'all';
    let searchQuery = '';

    // DOM elements
    const logContainer = document.getElementById('logContainer');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearch');
    const exportBtn = document.getElementById('exportBtn');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const emptyState = document.getElementById('emptyState');

    // Stats elements
    const totalCountEl = document.getElementById('totalCount');
    const infoCountEl = document.getElementById('infoCount');
    const debugCountEl = document.getElementById('debugCount');
    const filteredCountEl = document.getElementById('filteredCount');
    const showingCountEl = document.getElementById('showingCount');

    // Update stats
    function updateStats() {
      const total = logs.length;
      const infoCount = logs.filter(l => l.level === 'INFO').length;
      const debugCount = logs.filter(l => l.level === 'DEBUG').length;
      
      animateNumber(totalCountEl, total);
      animateNumber(infoCountEl, infoCount);
      animateNumber(debugCountEl, debugCount);
      animateNumber(filteredCountEl, filteredLogs.length);
      animateNumber(showingCountEl, filteredLogs.length);
    }

    // Animate number change
    function animateNumber(el, target) {
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      
      const duration = 300;
      const start = performance.now();
      
      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(current + (target - current) * eased);
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      requestAnimationFrame(update);
    }

    // Highlight search term
    function highlightText(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // Render logs
    function renderLogs() {
      if (filteredLogs.length === 0) {
        logContainer.innerHTML = '';
        emptyState.classList.remove('hidden');
        updateStats();
        return;
      }

      emptyState.classList.add('hidden');
      
      logContainer.innerHTML = filteredLogs.map((log, index) => `
        <div class="log-entry level-${log.level.toLowerCase()} px-4 py-3 animate-slide-in" style="animation-delay: ${Math.min(index * 0.05, 0.5)}s">
          <div class="flex flex-wrap items-start gap-2 mb-1">
            <span class="font-mono text-xs text-[var(--fg-muted)] whitespace-nowrap">${log.timestamp}</span>
            <span class="badge badge-${log.level.toLowerCase()}">${log.level}</span>
            <span class="font-mono text-xs text-[var(--fg-muted)] opacity-60">[${log.logger}]</span>
            <span class="font-mono text-xs text-[var(--accent)] opacity-80">(${log.thread})</span>
          </div>
          <p class="font-mono text-sm text-[var(--fg)] leading-relaxed break-all pl-1">
            ${highlightText(log.message, searchQuery)}
          </p>
        </div>
      `).join('');

      updateStats();
    }

    // Filter logs
    function filterLogs() {
      filteredLogs = logs.filter(log => {
        const matchesFilter = currentFilter === 'all' || log.level === currentFilter;
        const matchesSearch = !searchQuery || 
          log.message.toLowerCase().includes(searchQuery.toLowerCase()) ||
          log.raw.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesFilter && matchesSearch;
      });
      renderLogs();
    }

    // Event listeners
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      filterLogs();
    });

    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      filterLogs();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.level;
        filterLogs();
      });
    });

    exportBtn.addEventListener('click', () => {
      const content = filteredLogs.map(l => l.raw).join('\n');
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `logs-${new Date().toISOString().split('T')[0]}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
        if (document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      }
      if (e.key === 'Escape' && document.activeElement === searchInput) {
        searchInput.blur();
      }
    });

    // Initial render
    renderLogs();
  </script>
</body>
</html>
