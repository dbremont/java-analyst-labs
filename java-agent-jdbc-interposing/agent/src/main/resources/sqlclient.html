<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamly SQL Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Monaco Editor Loader -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #22d3ee;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Glass Panel Effect */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* FIX: Ensure editor container expands properly in flex layout */
        #editor-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="px-6 py-4 border-b border-slate-700/50 flex items-center justify-between bg-slate-900/80 backdrop-blur-md z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-semibold tracking-tight text-white">Streamly DB</h1>
                <p class="text-xs text-slate-500">Read-Only SQL Interface</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-text" class="text-xs text-red-400 font-medium hidden">Invalid Query</div>
            <button id="run-btn" class="flex items-center gap-2 text-xs px-4 py-1.5 rounded bg-cyan-600 hover:bg-cyan-500 transition text-white font-semibold shadow-lg shadow-cyan-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Run Query
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
        
        <!-- Editor Section -->
        <div class="flex-1 flex flex-col max-h-[45%] glass rounded-xl overflow-hidden shadow-2xl relative">
            <div class="flex items-center justify-between px-4 py-2 border-b border-slate-700/50 bg-slate-800/30 z-10 flex-shrink-0">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Query Editor</span>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-600 font-mono">Format: SQL</span>
                </div>
            </div>
            <!-- Editor Wrapper -->
            <div class="flex-1 overflow-hidden">
                <div id="editor-container"></div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="flex-1 glass rounded-xl overflow-hidden shadow-2xl flex flex-col">
            <div class="flex items-center justify-between px-4 py-2 border-b border-slate-700/50 bg-slate-800/30">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Results</span>
                <span id="result-meta" class="text-xs text-slate-500 font-mono hidden">0 rows returned</span>
            </div>
            
            <div id="results-container" class="flex-1 overflow-auto p-4 flex items-center justify-center">
                <!-- Empty State -->
                <div id="empty-state" class="text-center">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-slate-800 flex items-center justify-center text-slate-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                    </div>
                    <p class="text-slate-500 text-sm">Execute a query to see results</p>
                    <p class="text-slate-600 text-xs mt-1">Press <kbd class="px-1.5 py-0.5 bg-slate-700 rounded text-[10px]">Ctrl</kbd> + <kbd class="px-1.5 py-0.5 bg-slate-700 rounded text-[10px]">Enter</kbd> to run</p>
                </div>

                <!-- Error State -->
                <div id="error-state" class="hidden w-full h-full flex flex-col items-center justify-center text-red-400 p-4">
                    <div class="bg-red-500/10 border border-red-500/20 rounded-lg p-4 max-w-lg w-full">
                        <div class="flex items-center gap-2 mb-2 font-semibold">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            Error
                        </div>
                        <p id="error-message" class="text-sm font-mono text-red-300 whitespace-pre-wrap"></p>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loading-state" class="hidden flex items-center gap-3 text-slate-400">
                    <div class="spinner"></div>
                    <span class="text-sm font-medium">Executing query...</span>
                </div>

                <!-- Data Table -->
                <table id="data-table" class="hidden w-full text-left border-collapse text-sm">
                    <thead id="table-head" class="sticky top-0 bg-slate-900/95 backdrop-blur-sm z-10"></thead>
                    <tbody id="table-body" class="font-mono text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Monaco Editor Logic -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            // 1. Define a Custom Dark Theme
            monaco.editor.defineTheme('streamly-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '6b7280', fontStyle: 'italic' },
                    { token: 'keyword', foreground: '22d3ee' }, // Cyan
                    { token: 'string', foreground: 'a78bfa' },  // Purple
                    { token: 'number', foreground: 'fbbf24' },  // Amber
                    { token: 'identifier', foreground: 'f8fafc' },
                ],
                colors: {
                    'editor.background': '#0f172a', // Slate 900
                    'editor.foreground': '#f8fafc',
                    'editorLineNumber.foreground': '#475569',
                    'editorCursor.foreground': '#22d3ee',
                    'editor.selectionBackground': '#164e63',
                    'editor.lineHighlightBackground': '#1e293b',
                }
            });

            // 2. Create the Editor
            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: 'SELECT * FROM users LIMIT 10;',
                language: 'sql',
                theme: 'streamly-dark',
                fontFamily: 'JetBrains Mono, monospace',
                fontSize: 14,
                minimap: { enabled: false },
                automaticLayout: true,
                scrollBeyondLastLine: false,
                // UPDATED: Added top/bottom padding for breathing room
                padding: { top: 16, bottom: 16 }, 
                renderLineHighlight: 'line',
            });

            // 3. Add "SELECT Only" Validation
            const model = editor.getModel();
            
            editor.onDidChangeModelContent(() => {
                const value = editor.getValue();
                const lines = value.split('\n');
                const markers = [];

                // Regex to check if it starts with SELECT
                const isValid = /^\s*SELECT\s/i.test(value);

                if (!isValid && value.trim().length > 0) {
                    let firstContentLine = 0;
                    lines.forEach((line, index) => {
                        if (line.trim().length > 0 && firstContentLine === 0) {
                            firstContentLine = index;
                        }
                    });

                    markers.push({
                        severity: monaco.MarkerSeverity.Error,
                        message: 'Security Restriction: Only SELECT statements are allowed.',
                        startLineNumber: firstContentLine + 1,
                        startColumn: 1,
                        endLineNumber: firstContentLine + 1,
                        endColumn: lines[firstContentLine].length + 1,
                    });
                }

                monaco.editor.setModelMarkers(model, 'streamly', markers);
                
                // Update Header Status Text
                const statusText = document.getElementById('status-text');
                if (!isValid && value.trim().length > 0) {
                    statusText.classList.remove('hidden');
                } else {
                    statusText.classList.add('hidden');
                }
            });

            // 4. Connect to Logic
            const runBtn = document.getElementById('run-btn');
            
            // Shortcut: Ctrl+Enter
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
                executeQuery();
            });

            runBtn.addEventListener('click', executeQuery);

            function executeQuery() {
                const query = editor.getValue().trim();
                if (!query) return;

                // Security check
                const isValidSelect = /^\s*SELECT\s/i.test(query);
                if (!isValidSelect) {
                    showError("Security Error: Only SELECT statements are permitted.");
                    return;
                }

                setState('loading');
                runBtn.disabled = true;

                fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                })
                .then(res => res.json().then(data => {
                    if (!res.ok || data.error) throw new Error(data.error || `Server Error: ${res.status}`);
                    return data;
                }))
                .then(data => {
                    renderTable(data.data || data);
                })
                .catch(err => {
                    showError(err.message);
                })
                .finally(() => {
                    runBtn.disabled = false;
                });
            }
        });

        // --- UI Helpers ---
        
        function showError(msg) {
            document.getElementById('error-message').textContent = msg;
            setState('error');
        }

        function setState(state) {
            const ids = ['empty-state', 'error-state', 'loading-state', 'data-table'];
            ids.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('result-meta').classList.add('hidden');

            if (state === 'empty') document.getElementById('empty-state').classList.remove('hidden');
            if (state === 'loading') document.getElementById('loading-state').classList.remove('hidden');
            if (state === 'error') document.getElementById('error-state').classList.remove('hidden');
            if (state === 'success') {
                document.getElementById('data-table').classList.remove('hidden');
                document.getElementById('result-meta').classList.remove('hidden');
            }
        }

        function renderTable(data) {
            if (!Array.isArray(data) || data.length === 0) {
                document.getElementById('result-meta').textContent = '0 rows returned';
                document.getElementById('result-meta').classList.remove('hidden');
                setState('empty');
                return;
            }

            setState('success');
            document.getElementById('result-meta').textContent = `${data.length} rows returned`;

            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            thead.innerHTML = ''; tbody.innerHTML = '';

            const cols = Object.keys(data[0]);
            
            // Header
            const hr = document.createElement('tr');
            cols.forEach(c => {
                const th = document.createElement('th');
                th.className = 'px-4 py-2 border-b border-slate-700 font-sans font-semibold text-slate-300 text-xs uppercase tracking-wider bg-slate-800/50';
                th.textContent = c;
                hr.appendChild(th);
            });
            thead.appendChild(hr);

            // Body
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-cyan-900/10 transition-colors duration-150';
                cols.forEach(c => {
                    const td = document.createElement('td');
                    td.className = 'px-4 py-2 border-b border-slate-800 text-slate-300';
                    let val = row[c];
                    if(val === null) val = '<span class="text-slate-600 italic">NULL</span>';
                    else if(typeof val === 'object') val = JSON.stringify(val);
                    td.innerHTML = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
